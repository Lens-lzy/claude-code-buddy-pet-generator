<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy Pet Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 8px; }
        .header p { opacity: 0.9; }
        .content { padding: 30px; }
        .section { margin-bottom: 30px; }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #667eea;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }
        .item {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            background: white;
        }
        .item:hover { border-color: #667eea; background: #f5f7ff; }
        .item.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .stat-input label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        .stat-input input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        .stat-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .checkbox-label input { width: 20px; height: 20px; cursor: pointer; }
        .actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }
        .progress {
            margin-top: 20px;
            padding: 20px;
            background: #f5f7ff;
            border-radius: 8px;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 14px;
            color: #666;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f0fdf4;
            border: 2px solid #86efac;
            border-radius: 8px;
        }
        .result-title {
            font-size: 18px;
            font-weight: 600;
            color: #16a34a;
            margin-bottom: 12px;
        }
        .result-content {
            font-size: 14px;
            line-height: 1.8;
        }
        .result-content p { margin: 8px 0; }
        .result-content strong { color: #333; }
        .result-content code {
            background: #e0e0e0;
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
        }
        .error {
            background: #fef2f2;
            border-color: #fca5a5;
        }
        .error .result-title { color: #dc2626; }
        .info-box {
            background: #e0f2fe;
            border: 2px solid #38bdf8;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        .info-box strong { color: #0369a1; }
        .info-box code {
            background: #bae6fd;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        .file-upload {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }
        .file-upload input[type="file"] {
            flex: 1;
            padding: 10px;
            border: 2px dashed #667eea;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-success {
            background: #22c55e;
            color: white;
        }
        .btn-success:hover:not(:disabled) {
            background: #16a34a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Buddy Pet Generator</h1>
            <p>为 Claude Code 生成你想要的电子宠物</p>
        </div>

        <div class="content">
            <div class="info-box">
                <strong>📍 配置文件位置:</strong><br>
                • Mac/Linux: <code>~/.claude.json</code> (即 <code>/Users/你的用户名/.claude.json</code>)<br>
                • Windows: <code>%USERPROFILE%\.claude.json</code> (即 <code>C:\Users\你的用户名\.claude.json</code>)
            </div>

            <div class="section">
                <div class="section-title">选择物种</div>
                <div class="grid" id="species-grid"></div>
            </div>

            <div class="section">
                <div class="section-title">选择稀有度</div>
                <div class="grid" id="rarity-grid"></div>
            </div>

            <div class="section">
                <div class="section-title">选择帽子</div>
                <div class="grid" id="hat-grid"></div>
            </div>

            <div class="section">
                <div class="section-title">
                    <label class="checkbox-label">
                        <input type="checkbox" id="shiny-checkbox">
                        <span>✨ 闪光 (1% 概率)</span>
                    </label>
                </div>
            </div>

            <div class="section">
                <div class="section-title">属性要求 (最小值)</div>
                <div class="stats-grid">
                    <div class="stat-input">
                        <label>调试能力 (DEBUGGING)</label>
                        <input type="number" id="stat-DEBUGGING" min="0" max="100" placeholder="不限">
                    </div>
                    <div class="stat-input">
                        <label>耐心 (PATIENCE)</label>
                        <input type="number" id="stat-PATIENCE" min="0" max="100" placeholder="不限">
                    </div>
                    <div class="stat-input">
                        <label>混乱值 (CHAOS)</label>
                        <input type="number" id="stat-CHAOS" min="0" max="100" placeholder="不限">
                    </div>
                    <div class="stat-input">
                        <label>智慧 (WISDOM)</label>
                        <input type="number" id="stat-WISDOM" min="0" max="100" placeholder="不限">
                    </div>
                    <div class="stat-input">
                        <label>毒舌值 (SNARK)</label>
                        <input type="number" id="stat-SNARK" min="0" max="100" placeholder="不限">
                    </div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="generate-btn">🎲 开始生成</button>
                <button class="btn btn-secondary" id="copy-btn" disabled>📋 复制 UserID</button>
                <button class="btn btn-success" id="download-btn" disabled>💾 下载配置文件</button>
            </div>

            <div class="section" id="config-section" style="display: none;">
                <div class="section-title">📂 自动修改配置文件 (可选)</div>
                <p style="font-size: 14px; color: #666; margin-bottom: 12px;">
                    上传你的 <code>.claude.json</code> 文件，程序会自动删除 companion 字段并替换 userID，然后下载修改后的文件。
                </p>
                <div class="file-upload">
                    <input type="file" id="config-file" accept=".json" />
                </div>
            </div>

            <div id="progress-container" style="display: none;"></div>
            <div id="result-container"></div>
        </div>
    </div>

    <script>
        const SPECIES_LIST = ['duck','goose','blob','cat','dragon','octopus','owl',
            'penguin','turtle','snail','ghost','axolotl','capybara','cactus',
            'robot','rabbit','mushroom','chonk'];

        const SPECIES = [
            { id: 'duck', name: '🦆 鸭子' },
            { id: 'goose', name: '🪿 鹅' },
            { id: 'blob', name: '🫧 果冻' },
            { id: 'cat', name: '🐱 猫' },
            { id: 'dragon', name: '🐉 龙' },
            { id: 'octopus', name: '🐙 章鱼' },
            { id: 'owl', name: '🦉 猫头鹰' },
            { id: 'penguin', name: '🐧 企鹅' },
            { id: 'turtle', name: '🐢 乌龟' },
            { id: 'snail', name: '🐌 蜗牛' },
            { id: 'ghost', name: '👻 幽灵' },
            { id: 'axolotl', name: '🦎 六角恐龙' },
            { id: 'capybara', name: '🦫 水豚' },
            { id: 'cactus', name: '🌵 仙人掌' },
            { id: 'robot', name: '🤖 机器人' },
            { id: 'rabbit', name: '🐰 兔子' },
            { id: 'mushroom', name: '🍄 蘑菇' },
            { id: 'chonk', name: '🐈 胖猫' }
        ];

        const RARITIES = ['common','uncommon','rare','epic','legendary'];
        const RARITIES_DISPLAY = [
            { id: 'common', name: '★ 普通', color: '#9ca3af' },
            { id: 'uncommon', name: '★★ 非凡', color: '#22c55e' },
            { id: 'rare', name: '★★★ 稀有', color: '#3b82f6' },
            { id: 'epic', name: '★★★★ 史诗', color: '#a855f7' },
            { id: 'legendary', name: '★★★★★ 传说', color: '#eab308' }
        ];

        const HATS = [
            { id: 'none', name: '无帽子' },
            { id: 'crown', name: '👑 皇冠' },
            { id: 'tophat', name: '🎩 礼帽' },
            { id: 'propeller', name: '🚁 螺旋桨帽' },
            { id: 'halo', name: '😇 光环' },
            { id: 'wizard', name: '🧙 巫师帽' },
            { id: 'beanie', name: '🧢 毛线帽' },
            { id: 'tinyduck', name: '🦆 小鸭子' }
        ];

        const SALT = 'friend-2026-401';
        const RARITY_WEIGHTS = { common:60, uncommon:25, rare:10, epic:4, legendary:1 };
        const RARITY_RANK = { common:0, uncommon:1, rare:2, epic:3, legendary:4 };
        const EYES = ['·', '✦', '×', '◉', '@', '°'];

        let filters = {
            species: null,
            rarity: null,
            hat: null,
            shiny: false,
            minStats: {}
        };

        let currentResult = null;

        // Initialize UI
        function initUI() {
            const speciesGrid = document.getElementById('species-grid');
            SPECIES.forEach(s => {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = s.name;
                div.onclick = () => toggleFilter('species', s.id, div);
                speciesGrid.appendChild(div);
            });

            const rarityGrid = document.getElementById('rarity-grid');
            RARITIES_DISPLAY.forEach(r => {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = r.name;
                div.dataset.color = r.color;
                div.onclick = () => toggleFilter('rarity', r.id, div);
                rarityGrid.appendChild(div);
            });

            const hatGrid = document.getElementById('hat-grid');
            HATS.forEach(h => {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = h.name;
                div.onclick = () => toggleFilter('hat', h.id, div);
                hatGrid.appendChild(div);
            });
        }

        function toggleFilter(type, value, element) {
            const grid = element.parentElement;
            const items = grid.querySelectorAll('.item');

            if (filters[type] === value) {
                filters[type] = null;
                element.classList.remove('selected');
                element.style.borderColor = '';
                element.style.background = '';
            } else {
                items.forEach(item => {
                    item.classList.remove('selected');
                    item.style.borderColor = '';
                    item.style.background = '';
                });
                filters[type] = value;
                element.classList.add('selected');

                if (type === 'rarity') {
                    const color = element.dataset.color;
                    element.style.borderColor = color;
                    element.style.background = color;
                }
            }
        }

        // Hash function - mimics Bun.hash() using Wyhash-like algorithm
        // Bun.hash uses Wyhash internally, we approximate it with a similar fast hash
        function hashString(str) {
            // Convert string to bytes
            const encoder = new TextEncoder();
            const bytes = encoder.encode(str);

            // Wyhash-inspired implementation
            let h = 0n;
            const p0 = 0xa0761d6478bd642fn;
            const p1 = 0xe7037ed1a0b428dbn;

            for (let i = 0; i < bytes.length; i++) {
                h = h ^ BigInt(bytes[i]);
                h = (h * p0) & 0xffffffffffffffffn;
            }

            h = h ^ (h >> 32n);
            h = (h * p1) & 0xffffffffffffffffn;
            h = h ^ (h >> 32n);

            // Return as 32-bit unsigned integer
            return Number(h & 0xffffffffn);
        }

        // Mulberry32 PRNG
        function mulberry32(seed) {
            let a = seed >>> 0;
            return function() {
                a |= 0;
                a = (a + 0x6d2b79f5) | 0;
                let t = Math.imul(a ^ (a >>> 15), 1 | a);
                t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        function pick(rng, arr) { return arr[Math.floor(rng() * arr.length)] }

        function rollRarity(rng) {
            let roll = rng() * 100
            for (const r of RARITIES) { roll -= RARITY_WEIGHTS[r]; if (roll < 0) return r }
            return 'common'
        }

        function rollStats(rng, rarity) {
            const minStat = { common: 5, uncommon: 15, rare: 25, epic: 35, legendary: 50 }[rarity];
            const stats = {};
            const statNames = ['DEBUGGING', 'PATIENCE', 'CHAOS', 'WISDOM', 'SNARK'];

            const peakIdx = Math.floor(rng() * 5);
            const lowIdx = (peakIdx + 1 + Math.floor(rng() * 4)) % 5;

            statNames.forEach((name, i) => {
                if (i === peakIdx) {
                    stats[name] = minStat + 50 + Math.floor(rng() * 30);
                } else if (i === lowIdx) {
                    stats[name] = Math.max(1, minStat - 10 + Math.floor(rng() * 15));
                } else {
                    stats[name] = minStat + Math.floor(rng() * 40);
                }
            });

            return stats;
        }

        function generateFromUserId(userId) {
            const rng = mulberry32(hashString(userId + SALT));
            const rarity = rollRarity(rng);
            const species = pick(rng, SPECIES_LIST);
            const eye = pick(rng, EYES);
            const hat = rarity === 'common' ? 'none' : pick(rng, HATS.filter(h => h.id !== 'none').map(h => h.id));
            const shiny = rng() < 0.01;
            const stats = rollStats(rng, rarity);

            return { species, eye, rarity, hat, shiny, stats };
        }

        function randomHex(length) {
            const bytes = new Uint8Array(length);
            crypto.getRandomValues(bytes);
            return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function generateBuddy() {
            const generateBtn = document.getElementById('generate-btn');
            const copyBtn = document.getElementById('copy-btn');
            const downloadBtn = document.getElementById('download-btn');
            const progressContainer = document.getElementById('progress-container');
            const resultContainer = document.getElementById('result-container');

            generateBtn.disabled = true;
            copyBtn.disabled = true;
            downloadBtn.disabled = true;
            progressContainer.style.display = 'block';
            resultContainer.innerHTML = '';
            currentResult = null;

            // Get min stats
            const minStats = {};
            ['DEBUGGING', 'PATIENCE', 'CHAOS', 'WISDOM', 'SNARK'].forEach(stat => {
                const val = document.getElementById(`stat-${stat}`).value;
                if (val) minStats[stat] = parseInt(val);
            });

            filters.shiny = document.getElementById('shiny-checkbox').checked;
            filters.minStats = minStats;
            filters.maxIterations = 500000;

            progressContainer.innerHTML = `
                <div class="progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 50%"></div>
                    </div>
                    <div class="progress-text" id="progress-text">正在搜索中...</div>
                </div>
            `;

            try {
                const response = await fetch('http://localhost:3000/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(filters)
                });

                const result = await response.json();

                if (result.success) {
                    currentResult = result;
                    showResult(result);
                } else {
                    resultContainer.innerHTML = `
                        <div class="result error">
                            <div class="result-title">❌ 未找到匹配的宠物</div>
                            <div class="result-content">${result.error || '请尝试放宽筛选条件'}</div>
                        </div>
                    `;
                }
            } catch (error) {
                resultContainer.innerHTML = `
                    <div class="result error">
                        <div class="result-title">❌ 连接失败</div>
                        <div class="result-content">
                            无法连接到后端服务。请确保:<br>
                            1. 已安装 Bun (运行 <code>curl -fsSL https://bun.sh/install | bash</code>)<br>
                            2. 已启动后端服务 (双击 <code>启动服务器-Mac.command</code>)<br>
                            3. 服务运行在 http://localhost:3000<br><br>
                            错误信息: ${error.message}
                        </div>
                    </div>
                `;
            } finally {
                generateBtn.disabled = false;
                copyBtn.disabled = !currentResult;
                downloadBtn.disabled = !currentResult;
                progressContainer.style.display = 'none';
            }
        }

        function showResult(result) {
            const resultContainer = document.getElementById('result-container');
            const configSection = document.getElementById('config-section');
            const { uid, buddy, iterations } = result;

            const speciesName = SPECIES.find(s => s.id === buddy.species)?.name || buddy.species;
            const rarityInfo = RARITIES_DISPLAY.find(r => r.id === buddy.rarity);
            const hatName = HATS.find(h => h.id === buddy.hat)?.name || buddy.hat;

            // Show config section
            configSection.style.display = 'block';

            resultContainer.innerHTML = `
                <div class="result">
                    <div class="result-title">🎉 找到匹配的宠物!</div>
                    <div class="result-content">
                        <p><strong>物种:</strong> ${speciesName}</p>
                        <p><strong>稀有度:</strong> <span style="color: ${rarityInfo.color}">${rarityInfo.name}</span></p>
                        <p><strong>帽子:</strong> ${hatName}</p>
                        <p><strong>闪光:</strong> ${buddy.shiny ? '✨ 是' : '否'}</p>
                        <p><strong>属性:</strong></p>
                        <ul style="margin-left: 20px; margin-top: 4px;">
                            <li>调试能力: ${buddy.stats.DEBUGGING}</li>
                            <li>耐心: ${buddy.stats.PATIENCE}</li>
                            <li>混乱值: ${buddy.stats.CHAOS}</li>
                            <li>智慧: ${buddy.stats.WISDOM}</li>
                            <li>毒舌值: ${buddy.stats.SNARK}</li>
                        </ul>
                        <p style="margin-top: 12px;"><strong>User ID:</strong></p>
                        <p><code>${uid}</code></p>
                        <p style="margin-top: 8px;"><strong>迭代次数:</strong> ${iterations.toLocaleString()}</p>
                        <p style="margin-top: 12px; padding: 12px; background: #fff3cd; border-radius: 6px; font-size: 13px;">
                            💡 <strong>使用方法 (三选一):</strong><br><br>
                            <strong>方法 1 - 自动修改 (推荐):</strong><br>
                            1. 点击下方"自动修改配置文件"区域<br>
                            2. 上传你的 <code>.claude.json</code> 文件<br>
                            3. 自动下载修改后的文件<br>
                            4. 用下载的文件替换原配置文件<br>
                            5. 重启 Claude Code 并运行 <code>/buddy hatch</code><br><br>
                            <strong>方法 2 - 下载新配置:</strong><br>
                            1. 点击"下载配置文件"按钮<br>
                            2. 用下载的文件替换原配置文件<br>
                            3. 重启 Claude Code 并运行 <code>/buddy hatch</code><br><br>
                            <strong>方法 3 - 手动复制:</strong><br>
                            1. 点击"复制 UserID"按钮<br>
                            2. 编辑 <code>~/.claude.json</code><br>
                            3. 删除 <code>companion</code> 字段(如果有)<br>
                            4. 将 <code>userID</code> 替换为复制的值<br>
                            5. 重启 Claude Code 并运行 <code>/buddy hatch</code>
                        </p>
                    </div>
                </div>
            `;
        }

        function copyUserId() {
            if (!currentResult) return;

            navigator.clipboard.writeText(currentResult.uid).then(() => {
                const btn = document.getElementById('copy-btn');
                const originalText = btn.textContent;
                btn.textContent = '✅ 已复制!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }

        function downloadConfig() {
            if (!currentResult) return;

            const config = {
                userID: currentResult.uid
            };

            const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '.claude.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            const btn = document.getElementById('download-btn');
            const originalText = btn.textContent;
            btn.textContent = '✅ 已下载!';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 2000);
        }

        function handleConfigUpload(event) {
            const file = event.target.files[0];
            if (!file || !currentResult) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const config = JSON.parse(e.target.result);

                    // Remove companion field and update userID
                    delete config.companion;
                    config.userID = currentResult.uid;

                    // Download modified config
                    const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = '.claude.json';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    alert('✅ 配置文件已修改并下载!\n请用下载的文件替换原配置文件，然后重启 Claude Code。');

                    // Reset file input
                    event.target.value = '';
                } catch (err) {
                    alert('❌ 配置文件格式错误: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        // Event listeners
        document.getElementById('generate-btn').onclick = generateBuddy;
        document.getElementById('copy-btn').onclick = copyUserId;
        document.getElementById('download-btn').onclick = downloadConfig;
        document.getElementById('config-file').onchange = handleConfigUpload;

        // Initialize
        initUI();
    </script>
</body>
</html>
